<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Policy Q&A Assistant</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Insurance Policy Q&A Assistant</h1>

    <div class="card">

        <h2>Upload Insurance Policy</h2>

        <input type="file" id="pdfFile" accept=".pdf">

        <button onclick="uploadPDF()">
            Upload PDF
        </button>

        <p id="uploadStatus"></p>

    </div>

    <div class="card">

        <h2>Ask a Question</h2>

        <textarea
            id="question"
            rows="4"
            placeholder="Example: What is the grace period?"
        ></textarea>

        <button onclick="askQuestion()">
            Ask
        </button>

    </div>

    <div class="card">

        <h2>Answer</h2>

        <div id="answer">

            Your answer will appear here.

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
